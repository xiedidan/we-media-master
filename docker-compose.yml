version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng-we-media
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET=mysecretkey123
      - SEARXNG_BASE_URL=http://localhost:18080/
      - HTTP_PROXY=http://host.docker.internal:6478
      - HTTPS_PROXY=http://host.docker.internal:6478
      - http_proxy=http://host.docker.internal:6478
      - https_proxy=http://host.docker.internal:6478
    extra_hosts:
      - "host.docker.internal:host-gateway"