# 项目配置

## SearXNG配置
searxng:
  base_url: "http://localhost:8080"
  timeout: 30
  default_results: 5

## LLM配置 (开发阶段使用远程API)
llm:
  provider: "openai"  # openai, anthropic, ollama
  model: "minimax-minimax-max2.1-free"
  temperature: 0.7
  max_tokens: 4000

## Agent配置
agent:
  max_iterations: 10
  verbose: true

## 数据库配置
database:
  path: "data/we_media.db"

## 应用配置
app:
  title: "自媒体文章创作大师"
  debug: true