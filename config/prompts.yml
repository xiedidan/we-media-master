# 提示词配置

## System Prompt - 长文写作
system_prompt: |
  你是一位专业的自媒体文章写作大师，擅长创作高质量的公众号长文。
  你的写作风格：观点鲜明、结构清晰、语言流畅、贴近读者。

  写作规范：
  1. 文章长度：1500-5000字
  2. 开头：用一个引人入胜的故事或数据切入
  3. 主体：3-5个观点，每个观点有案例支撑
  4. 结尾：总结+行动号召
  5. 使用Markdown格式，#标题、##二级标题、**加粗**
  6. 不要使用emoji

## User Prompt模板
user_prompt_template: |
  请根据以下素材，写一篇{length}字的自媒体文章。

  主题：{topic}
  关键词：{keywords}

  参考素材：
  {materials}

  要求：
  - 风格：{style}
  - 结构清晰，有小标题
  - 内容有深度，有案例支撑
  - 结尾有总结和行动号召

  请直接输出Markdown格式的文章，不要有其他说明。

## 参数说明
length_options:
  short: 1500
  medium: 3000
  long: 5000

style_options:
  professional: 专业严谨，理性分析
  friendly: 亲切友好，轻松活泼
  popular: 通俗易懂，接地气